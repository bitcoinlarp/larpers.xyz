<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZACO | BRAWL DOSSIER</title>
    <style>
        :root {
            --primary: #fff;
            --accent: #ff0000;
            --bg: #050505;
            --panel: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Scanline Overlay */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
        }

        .container {
            width: 90%;
            max-width: 600px;
            padding: 40px 0;
            z-index: 1;
        }

        .header {
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .back-btn {
            text-decoration: none;
            color: var(--accent);
            font-size: 12px;
            border: 1px solid var(--accent);
            padding: 5px 10px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: var(--accent);
            color: #000;
        }

        .player-card {
            background: var(--panel);
            border: 1px solid #222;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .stat-item {
            border-left: 3px solid var(--accent);
            padding-left: 10px;
        }

        .stat-label {
            font-size: 10px;
            color: #666;
            display: block;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
        }

        .brawler-img-placeholder {
            width: 100%;
            height: 250px;
            background: #111;
            border: 1px dashed #333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .footer {
            margin-top: auto;
            padding: 20px;
            font-size: 10px;
            color: #333;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Brawl Data</h1>
        <a href="index.html" class="back-btn">< RETURN</a>
    </div>

    <div class="player-card">
        <div class="stat-label">Subject ID</div>
        <div class="stat-value" style="color: var(--accent);">#YOUR_TAG_HERE</div>
        
        <div class="stats-grid">
            <div class="stat-item">
                <span class="stat-label">Trophies</span>
                <span class="stat-value">50,000+</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Rank</span>
                <span class="stat-value">Master</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">3v3 Wins</span>
                <span class="stat-value">15,402</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Club</span>
                <span class="stat-value">ZACO BLUDS</span>
            </div>
        </div>

        <div class="brawler-img-placeholder">
            [ IMAGE_DATA_MISSING ]
            </div>
    </div>

    <div class="player-card">
        <div class="stat-label">Main Brawlers</div>
        <p style="font-size: 14px; line-height: 1.6;">
            MORTIS // LEON // EDGAR<br>
            Current Status: ACTIVE
        </p>
    </div>
</div>

<div class="footer">
    UNAUTHORIZED ACCESS IS PROHIBITED // 2026
</div>

</body>
</html>
