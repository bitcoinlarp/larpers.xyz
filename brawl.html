<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX_RANKED // DOSSIER</title>
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: #0d0d0d;
            --accent-color: #ff3e3e; 
            --text-main: #ffffff;
            --text-dim: #444;
            --border-style: 4px solid #1a1a1a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-transform: uppercase;
            overflow: hidden;
        }

        .dossier-container {
            width: 500px; /* Even bigger for the elo stats */
            background: var(--panel-bg);
            border: var(--border-style);
            padding: 40px;
            box-shadow: 20px 20px 0px var(--accent-color);
            position: relative;
        }

        .header {
            border-bottom: var(--border-style);
            margin-bottom: 30px;
            padding-bottom: 20px;
        }

        .header h1 {
            font-size: 2.2rem;
            margin: 0;
            letter-spacing: 6px;
            font-weight: 900;
        }

        .status {
            font-size: 1rem;
            color: var(--accent-color);
            margin-top: 10px;
            cursor: pointer;
            border: 2px solid var(--accent-color);
            display: inline-block;
            padding: 8px 15px;
            transition: 0.2s;
        }

        .status:hover {
            background: var(--accent-color);
            color: black;
        }

        .stat-item {
            margin: 25px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 1.1rem;
            font-weight: bold;
        }

        .stat-value-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .stat-value {
            font-weight: 900;
            font-size: 2rem;
            color: var(--text-main);
            text-shadow: 2px 2px 0px #333;
        }

        .trophy-icon {
            width: 45px; /* Bigger PNGs */
            height: auto;
            image-rendering: pixelated; 
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #222;
            text-align: center;
            letter-spacing: 3px;
            border-top: 2px solid #1a1a1a;
            padding-top: 20px;
        }

        .blink { animation: blinker 0.6s step-end infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <audio id="bg-music" src="unhappy.mp3" loop></audio>

    <div class="dossier-container">
        <div class="header">
            <h1>THREAT_LEVEL</h1>
            <div class="status" id="conn-status" onclick="initializeSystem()">BOOT_SYSTEM</div>
        </div>

        <div class="stat-item">
            <span class="stat-label">CURRENT_TRPY</span>
            <div class="stat-value-group">
                <span class="stat-value" id="trophies">----</span>
                <img src="trophy.webp" alt="TRPY" class="trophy-icon">
            </div>
        </div>

        <div class="stat-item">
            <span class="stat-label">PEAK_TRPY</span>
            <div class="stat-value-group">
                <span class="stat-value" id="highest">----</span>
                <img src="trophy.webp" alt="TRPY" class="trophy-icon">
            </div>
        </div>

        <div class="stat-item">
            <span class="stat-label">RANKED_PEAK</span>
            <span class="stat-value" id="ranked-elo">----</span>
        </div>

        <div class="stat-item">
            <span class="stat-label">3V3_WINS</span>
            <span class="stat-value" id="victories">----</span>
        </div>

        <div class="footer">
            SECURE ACCESS // LARPERS.XYZ // NO_GAMES
        </div>
    </div>

    <script>
        function initializeSystem() {
            const audio = document.getElementById('bg-music');
            audio.play().catch(e => console.log("Audio block: Click again"));
            fetchBrawlStats();
        }

        async function fetchBrawlStats() {
            const statusEl = document.getElementById('conn-status');
            const vercelUrl = "https://brawl-iota.vercel.app/api/brawl"; 
            
            statusEl.innerText = "SCRAPING_DATA...";
            statusEl.classList.add('blink');

            try {
                const response = await fetch(vercelUrl);
                const data = await response.json();
                
                document.getElementById('trophies').innerText = data.trophies || 0;
                document.getElementById('highest').innerText = data.highestTrophies || 0;
                
                // Using highestPowerPlayPoints as the proxy for Ranked Peak
                document.getElementById('ranked-elo').innerText = data.highestPowerPlayPoints || "0";
                
                document.getElementById('victories').innerText = data['3vs3Victories'] || 0;
                
                statusEl.innerText = "ENCRYPTED_SYNC";
                statusEl.style.color = "#00ff00"; 
                statusEl.classList.remove('blink');

            } catch (error) {
                statusEl.innerText = "SYNC_FAILED";
                statusEl.style.color = "red";
            }
        }
    </script>
</body>
</html>
