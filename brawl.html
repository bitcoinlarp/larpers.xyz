<!DOCTYPE html>
<html>
<head>
    <title>Brawl Stats</title>
</head>
<body>

    <div class="stat-item">Trophies: <span class="stat-value">Loading...</span></div>
    <div class="stat-item">Highest Trophies: <span class="stat-value">Loading...</span></div>
    <div class="stat-item">3vs3 Victories: <span class="stat-value">Loading...</span></div>
    <div class="stat-item">Club: <span class="stat-value">Loading...</span></div>

    <script>
        async function fetchBrawlStats() {
            const vercelUrl = "https://brawl-iota.vercel.app/api/brawl"; 
            try {
                const response = await fetch(vercelUrl);
                if (!response.ok) throw new Error('Access denied.');
                
                const dataArray = await response.json();
                const data = dataArray; // Access the first player in the array
                
                if (!data) throw new Error('No player data found.');

                // Update UI
                document.querySelector('.stat-item:nth-child(1) .stat-value').innerText = (data.trophies || 0).toLocaleString();
                document.querySelector('.stat-item:nth-child(2) .stat-value').innerText = (data.highestTrophies || 0).toLocaleString();
                document.querySelector('.stat-item:nth-child(3) .stat-value').innerText = (data['3vs3Victories'] || 0).toLocaleString();
                document.querySelector('.stat-item:nth-child(4) .stat-value').innerText = data.club?.name || "NO CLUB";
                
                console.log("Stats Synchronized.");
            } catch (error) {
                console.error("Fetch Error:", error);
                document.querySelectorAll('.stat-value').forEach(el => el.innerText = "ERR");
            }
        }

        window.onload = fetchBrawlStats;
    </script>
</body>
</html>
