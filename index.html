<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIBE // OFFICIAL</title>
    <style>
        :root {
            --primary: #fff;
            --accent: #ff0000; 
            --bg: #050505;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Courier New', Courier, monospace;
            height: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Scanline Overlay Effect */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: 2;
            pointer-events: none;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: crosshair;
            z-index: 100;
            transition: opacity 0.8s ease;
        }

        .glitch {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 5px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .main-content {
            text-align: center;
            z-index: 1;
            width: 90%;
            max-width: 500px;
        }

        img {
            max-width: 100%;
            height: auto;
            filter: grayscale(100%) contrast(120%);
            transition: filter 0.3s ease;
            border: 1px solid #222;
        }

        img:hover {
            filter: grayscale(0%) contrast(100%);
            border-color: var(--accent);
        }

        .caption {
            margin: 20px 0;
            font-size: 12px;
            letter-spacing: 2px;
            color: #666;
            text-transform: uppercase;
        }

        .socials {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .social-link {
            text-decoration: none;
            color: var(--primary);
            border: 1px solid #222;
            padding: 10px;
            font-size: 14px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.02);
            position: relative;
            overflow: hidden;
        }

        .social-link:hover {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            transform: skewX(-2deg); /* Added a slight tuff tilt */
        }

    </style>
</head>
<body>

<div id="overlay">
    <div class="glitch">[ ACCESS GRANTED? ]</div>
</div>

<div class="main-content">
    <img src="tung.gif" alt="main-visual">
    <div class="caption">ribe // socials</div>
    
    <div class="socials">
        <a href="#" class="social-link">Discord // ribe_community</a>
        <a href="brawl.html" class="social-link">Brawl Stars // Profile</a>
        <a href="#" class="social-link">Cryptos // ETH / SOL</a>
        <a href="#" class="social-link">Etc // Info</a>
    </div>
</div>

<audio id="myAudio" loop>
    <source src="unhappy.mp3" type="audio/mpeg">
</audio>

<script>
    const overlay = document.getElementById('overlay');
    const audio = document.getElementById('myAudio');

    overlay.addEventListener('click', () => {
        audio.play();
        overlay.style.opacity = '0';
        setTimeout(() => {
            overlay.style.display = 'none';
        }, 800);
    });
</script>

</body>
</html>
