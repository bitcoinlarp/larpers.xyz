<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIBE // OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ffffff;
            --accent: #ff0000; 
            --bg: #000000;
            --glass: rgba(0, 0, 0, 0.5); /* Plus transparent pour voir la vidéo derrière */
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Inter', sans-serif;
            height: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Vidéo de fond - Correction de la luminosité */
        .video-background {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            transform: translate(-50%, -50%);
            z-index: -1;
            filter: brightness(0.7) contrast(1.1); /* Augmenté de 0.35 à 0.7 */
            object-fit: cover;
        }

        /* Overlay léger pour la texture */
        .overlay-fx {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.4) 50%);
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
            opacity: 0.3;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: opacity 0.8s ease;
        }

        .main-content {
            text-align: center;
            z-index: 20;
            background: var(--glass);
            padding: 40px 50px;
            border-radius: 8px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .founder-tag {
            color: var(--accent);
            font-size: 14px;
            font-weight: 900;
            margin-bottom: 5px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        .sub-tag {
            color: #bbb;
            font-size: 11px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .social-icons a {
            color: #fff;
            font-size: 24px;
            text-decoration: none;
            transition: 0.3s;
            opacity: 0.8;
            position: relative;
        }

        .social-icons a:hover {
            opacity: 1;
            color: var(--accent);
            transform: scale(1.1);
        }

        #tooltip {
            visibility: hidden;
            background-color: var(--accent);
            color: #000;
            padding: 4px 8px;
            position: absolute;
            bottom: 150%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            font-weight: bold;
            opacity: 0;
            transition: 0.3s;
        }

        #tooltip.show {
            visibility: visible;
            opacity: 1;
        }

        .glitch {
            letter-spacing: 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

<div class="overlay-fx"></div>

<div id="overlay">
    <div class="glitch" style="color: var(--accent);">[ INITIALISER ]</div>
</div>

<video autoplay muted loop playsinline class="video-background">
    <source src="https://r2.guns.lol/aa29fb22-f7cd-49ad-b346-e0ff98f25e55.mp4" type="video/mp4">
</video>

<div class="main-content">
    <div class="founder-tag">Founder @ #RIBE</div>
    <div class="sub-tag">Automotive // Creative</div>
    
    <div class="social-icons">
        <a href="javascript:void(0)" onclick="copyDiscord(this)">
            <i class="fab fa-discord"></i>
            <span id="tooltip">Copié !</span>
        </a>
        <a href="#"><i class="fas fa-gamepad"></i></a>
        <a href="#"><i class="fab fa-youtube"></i></a>
        <a href="#"><i class="fab fa-ethereum"></i></a>
        <a href="#"><i class="fab fa-telegram"></i></a>
    </div>
</div>

<audio id="myAudio" loop>
    <source src="unhappy.mp3" type="audio/mpeg">
</audio>

<script>
    const overlay = document.getElementById('overlay');
    const audio = document.getElementById('myAudio');

    overlay.addEventListener('click', () => {
        audio.play();
        overlay.style.opacity = '0';
        setTimeout(() => { overlay.style.display = 'none'; }, 800);
    });

    function copyDiscord(element) {
        navigator.clipboard.writeText("@ritabeagle").then(() => {
            const tooltip = document.getElementById('tooltip');
            tooltip.classList.add('show');
            setTimeout(() => { tooltip.classList.remove('show'); }, 2000);
        });
    }
</script>

</body>
</html>
