<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIBE // OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ffffff;
            --accent: #ff0000; 
            --bg: #0a0a0a;
            --glass: rgba(0, 0, 0, 0.6);
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Video/Image Background */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: brightness(0.4) contrast(1.1);
        }

        .bg-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* CRT/Scanline Overlay */
        .overlay-fx {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 3px;
            z-index: 10;
            pointer-events: none;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: opacity 1s ease;
        }

        .main-content {
            text-align: center;
            z-index: 20;
            background: var(--glass);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .founder-tag {
            color: var(--accent);
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .sub-tag {
            color: #888;
            font-size: 12px;
            margin-bottom: 25px;
        }

        /* Icon Row Styles */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 10px;
        }

        .social-icons a {
            color: #fff;
            font-size: 24px;
            text-decoration: none;
            transition: all 0.3s ease;
            opacity: 0.7;
        }

        .social-icons a:hover {
            opacity: 1;
            color: var(--accent);
            transform: translateY(-3px);
            text-shadow: 0 0 10px var(--accent);
        }

        .glitch {
            letter-spacing: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.98); }
        }
    </style>
</head>
<body>

<div class="overlay-fx"></div>

<div id="overlay">
    <div class="glitch" style="color: var(--accent);">[ CLICK TO ENTER ]</div>
</div>

<div class="bg-container">
    <img src="YOUR_CAR_IMAGE.jpg" alt="background">
</div>

<div class="main-content">
    <div class="founder-tag">Founder @ #RIBE</div>
    <div class="sub-tag">Automotive & Digital Arts</div>
    
    <div class="social-icons">
        <a href="#" title="Discord"><i class="fab fa-discord"></i></a>
        <a href="#" title="Roblox"><i class="fas fa-gamepad"></i></a>
        <a href="#" title="YouTube"><i class="fab fa-youtube"></i></a>
        <a href="#" title="Crypto/Ethereum"><i class="fab fa-ethereum"></i></a>
        <a href="#" title="Telegram"><i class="fab fa-telegram"></i></a>
    </div>
</div>

<audio id="myAudio" loop>
    <source src="unhappy.mp3" type="audio/mpeg">
</audio>

<script>
    const overlay = document.getElementById('overlay');
    const audio = document.getElementById('myAudio');

    overlay.addEventListener('click', () => {
        audio.play();
        overlay.style.opacity = '0';
        setTimeout(() => {
            overlay.style.display = 'none';
        }, 1000);
    });
</script>

</body>
</html>
