<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIBE // OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ffffff;
            --accent: #ff0000; 
            --bg: #0a0a0a;
            --glass: rgba(0, 0, 0, 0.7);
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Video Background */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: brightness(0.35) contrast(1.2);
            object-fit: cover;
        }

        /* CRT/Scanline Overlay Effect */
        .overlay-fx {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 3px;
            z-index: 10;
            pointer-events: none;
        }

        /* Initial Enter Screen */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: opacity 1s ease;
        }

        /* Central Card */
        .main-content {
            text-align: center;
            z-index: 20;
            background: var(--glass);
            padding: 40px 60px;
            border-radius: 4px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            position: relative;
        }

        .founder-tag {
            color: var(--accent);
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 4px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .sub-tag {
            color: #777;
            font-size: 11px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* Social Icon Layout */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 28px;
        }

        .social-icons a {
            color: #fff;
            font-size: 22px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0.6;
            position: relative;
        }

        .social-icons a:hover {
            opacity: 1;
            color: var(--accent);
            transform: scale(1.2);
            text-shadow: 0 0 15px var(--accent);
        }

        /* Tooltip styling for Discord copy */
        #tooltip {
            visibility: hidden;
            background-color: var(--accent);
            color: #000;
            text-align: center;
            padding: 4px 8px;
            border-radius: 2px;
            position: absolute;
            z-index: 30;
            bottom: 150%;
            left: 50%;
            margin-left: -35px;
            font-size: 10px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            text-transform: uppercase;
        }

        #tooltip.show {
            visibility: visible;
            opacity: 1;
        }

        .glitch {
            letter-spacing: 6px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.2; }
        }
    </style>
</head>
<body>

<div class="overlay-fx"></div>

<div id="overlay">
    <div class="glitch" style="color: var(--accent); text-transform: uppercase;">[ Click to Initialize ]</div>
</div>

<video autoplay muted loop playsinline class="video-background">
    <source src="https://r2.guns.lol/aa29fb22-f7cd-49ad-b346-e0ff98f25e55.mp4" type="video/mp4">
</video>

<div class="main-content">
    <div class="founder-tag">Founder @ #RIBE</div>
    <div class="sub-tag">Automotive // Creative</div>
    
    <div class="social-icons">
        <a href="javascript:void(0)" onclick="copyDiscord(this)" title="Copy Discord">
            <i class="fab fa-discord"></i>
            <span id="tooltip">Copied!</span>
        </a>
        
        <a href="#" target="_blank" title="Roblox"><i class="fas fa-gamepad"></i></a>
        <a href="#" target="_blank" title="YouTube"><i class="fab fa-youtube"></i></a>
        <a href="#" target="_blank" title="Ethereum"><i class="fab fa-ethereum"></i></a>
        <a href="#" target="_blank" title="Telegram"><i class="fab fa-telegram"></i></a>
    </div>
</div>

<audio id="myAudio" loop>
    <source src="unhappy.mp3" type="audio/mpeg">
</audio>

<script>
    const overlay = document.getElementById('overlay');
    const audio = document.getElementById('myAudio');

    // Handle Entry
    overlay.addEventListener('click', () => {
        audio.play();
        overlay.style.opacity = '0';
        setTimeout(() => {
            overlay.style.display = 'none';
        }, 1000);
    });

    // Copy Discord Function
    function copyDiscord(element) {
        const discordTag = "@ritabeagle";
        
        navigator.clipboard.writeText(discordTag).then(() => {
            const tooltip = document.getElementById('tooltip');
            tooltip.classList.add('show');
            
            setTimeout(() => {
                tooltip.classList.remove('show');
            }, 2000);
        }).catch(err => {
            console.error('Copy failed: ', err);
        });
    }
</script>

</body>
</html>
