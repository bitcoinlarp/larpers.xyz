<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIBE // OFFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ffffff;
            --accent: #ff0000; 
            --bg: #000000;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #bgVideo {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -100;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(0.6) contrast(1.1); /* Légèrement plus sombre pour la lisibilité */
            background-color: black;
        }

        .overlay-fx {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px;
            z-index: 1;
            pointer-events: none; /* Important pour cliquer à travers */
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            transition: opacity 1s ease, visibility 1s;
        }

        .main-content {
            text-align: center;
            z-index: 100;
            background: transparent;
            position: relative;
        }

        .founder-tag {
            color: var(--accent);
            font-size: 14px;
            font-weight: 900;
            margin-bottom: 5px;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
        }

        .sub-tag {
            color: #ffffff;
            font-size: 11px;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0,0,0,1);
            opacity: 0.8;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .social-icons a {
            color: #fff;
            font-size: 26px;
            text-decoration: none;
            transition: 0.3s ease;
            filter: drop-shadow(0 0 10px rgba(0,0,0,1));
            position: relative;
            display: inline-block;
        }

        .social-icons a:hover {
            color: var(--accent);
            transform: scale(1.2);
        }

        #tooltip {
            visibility: hidden;
            background-color: var(--accent);
            color: #000;
            padding: 4px 10px;
            position: absolute;
            bottom: 150%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            font-weight: bold;
            white-space: nowrap;
            border-radius: 2px;
            opacity: 0;
            transition: 0.3s;
        }

        #tooltip.show { visibility: visible; opacity: 1; }

        .glitch { animation: pulse 2s infinite; letter-spacing: 5px; font-weight: bold; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<video muted loop playsinline id="bgVideo">
    <source src="https://r2.guns.lol/aa29fb22-f7cd-49ad-b346-e0ff98f25e55.mp4" type="video/mp4">
</video>

<div class="overlay-fx"></div>

<div id="overlay">
    <div id="statusText" class="glitch" style="color: var(--accent);">[ LOADING... ]</div>
</div>

<div class="main-content">
    <div class="founder-tag">Founder @ #RIBE</div>
    <div class="sub-tag">Automotive // Creative</div>
    
    <div class="social-icons">
        <a href="javascript:void(0)" onclick="copyDiscord(this)">
            <i class="fab fa-discord"></i>
            <span id="tooltip">Copied!</span>
        </a>
        <a href="#"><i class="fas fa-gamepad"></i></a>
        <a href="#"><i class="fab fa-youtube"></i></a>
        <a href="#"><i class="fab fa-ethereum"></i></a>
        <a href="#"><i class="fab fa-telegram"></i></a>
    </div>
</div>

<audio id="myAudio" loop>
    <source src="unhappy.mp3" type="audio/mpeg">
</audio>

<script>
    const overlay = document.getElementById('overlay');
    const statusText = document.getElementById('statusText');
    const audio = document.getElementById('myAudio');
    const video = document.getElementById('bgVideo');

    // Mise à jour du texte quand la vidéo est prête
    video.addEventListener('canplaythrough', () => {
        statusText.innerText = "[ CLICK TO ENTER ]";
    });

    overlay.addEventListener('click', () => {
        // On démute la vidéo et on lance l'audio au clic
        video.muted = false; 
        video.play();
        audio.play().catch(e => console.log("Audio play blocked"));
        
        overlay.style.opacity = '0';
        setTimeout(() => { 
            overlay.style.visibility = 'hidden'; 
        }, 1000);
    });

    function copyDiscord(element) {
        const discordTag = "@ritabeagle"; // Ton tag
        navigator.clipboard.writeText(discordTag).then(() => {
            const tooltip = document.getElementById('tooltip');
            tooltip.classList.add('show');
            setTimeout(() => { tooltip.classList.remove('show'); }, 2000);
        });
    }
</script>

</body>
</html>
